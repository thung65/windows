name: Windows 10 noVNC via Nginx Proxy

on: [workflow_dispatch]

jobs:
  run-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Kích hoạt KVM (Tăng tốc máy ảo)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm cpu-checker
          kvm-ok

      - name: Khởi chạy Windows 10 Pro bằng Docker
        run: |
          docker run -d --name win10 \
            -p 8006:8006 \
            --device=/dev/kvm \
            --cap-add=NET_ADMIN \
            -e VERSION="win10" \
            -e RAM_SIZE="4G" \
            -e CPU_CORES="2" \
            dockurr/windows
          echo "Đang tải và khởi tạo Windows 10 ngầm..."

      - name: Cấu hình Nginx làm Reverse Proxy cho noVNC
        run: |
          sudo rm -f /etc/nginx/sites-enabled/default
          cat << 'EOF' | sudo tee /etc/nginx/sites-available/novnc
          server {
              listen 80;
              server_name localhost;

              location / {
                  proxy_pass http://127.0.0.1:8006;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "Upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  
                  proxy_read_timeout 3600s;
                  proxy_send_timeout 3600s;
              }
          }
          EOF
          sudo ln -s /etc/nginx/sites-available/novnc /etc/nginx/sites-enabled/
          sudo systemctl restart nginx
          echo "Nginx đã chạy trên cổng 80."

      - name: Khởi tạo đường link noVNC qua Localtunnel
        run: |
          # 1. Cài đặt localtunnel toàn cục qua npm (đã có sẵn trên GitHub Runner)
          sudo npm install -g localtunnel
          
          # 2. Khởi chạy localtunnel hướng vào cổng 80 của Nginx và lưu log
          lt --port 80 > localtunnel.log 2>&1 &
          
          # 3. Chờ 5 giây để hệ thống cấp link ổn định
          sleep 5
          
          # 4. Trích xuất đường link công khai duy nhất từ file log
          echo "===================================================="
          echo "=== ĐƯỜNG LINK TRUY CẬP WINDOWS 10 CỦA BẠN ==="
          cat localtunnel.log
          echo "===================================================="
