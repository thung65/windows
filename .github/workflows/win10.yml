name: Windows 10 noVNC via Nginx Proxy

on: [workflow_dispatch]

jobs:
  run-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Kích hoạt KVM (Tăng tốc máy ảo)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm cpu-checker
          kvm-ok

      - name: Khởi chạy Windows 10 Pro bằng Docker
        run: |
          docker run -d --name win10 \
            -p 8006:8006 \
            --device=/dev/kvm \
            --cap-add=NET_ADMIN \
            -e VERSION="win10" \
            -e RAM_SIZE="4G" \
            -e CPU_CORES="2" \
            dockurr/windows
          echo "Đang tải và khởi tạo Windows 10 ngầm..."

      - name: Cấu hình Nginx làm Reverse Proxy cho noVNC
        run: |
          sudo rm -f /etc/nginx/sites-enabled/default
          cat << 'EOF' | sudo tee /etc/nginx/sites-available/novnc
          server {
              listen 80;
              server_name localhost;

              location / {
                  proxy_pass http://127.0.0.1:8006;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "Upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  
                  proxy_read_timeout 3600s;
                  proxy_send_timeout 3600s;
              }
          }
          EOF
          sudo ln -s /etc/nginx/sites-available/novnc /etc/nginx/sites-enabled/
          sudo systemctl restart nginx

      - name: Cài đặt Cloudflare Tunnel và xuất đường link noVNC
        run: |
          # 1. Tải trực tiếp file binary thực thi chính thức từ Cloudflare
          curl -L --output cloudflared https://github.com
          
          # 2. Cấp quyền thực thi cho file vừa tải
          chmod +x cloudflared
          
          # 3. Di chuyển file vào thư mục hệ thống để có thể gọi lệnh ở mọi nơi
          sudo mv cloudflared /usr/local/bin/
          
          # 4. Khởi chạy tunnel miễn phí hướng về cổng 80 của Nginx
          echo "=== ĐANG KHỞI TẠO ĐƯỜNG LINK TRY CLOUDFLARE ==="
          cloudflared tunnel --url http://127.0.0.1:80 > cloudflare.log 2>&1 &
          
          # Chờ 8 giây để Cloudflare thiết lập đường truyền ổn định
          sleep 8
          
          # 5. Trích xuất đường link kết nối .trycloudflare.com từ file log
          echo "===================================================="
          echo "ĐƯỜNG LINK TRUY CẬP WINDOWS 10 NOVNC CỦA BẠN:"
          grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare.log | head -n 1
          echo "===================================================="
