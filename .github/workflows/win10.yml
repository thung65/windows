name: Windows 10 noVNC via Nginx Proxy

on: [workflow_dispatch]

jobs:
  run-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Kích hoạt KVM (Tăng tốc máy ảo)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm cpu-checker
          kvm-ok

      - name: Khởi chạy Windows 10 Pro bằng Docker
        run: |
          docker run -d --name win10 \
            -p 8006:8006 \
            --device=/dev/kvm \
            --cap-add=NET_ADMIN \
            -e VERSION="win10" \
            -e RAM_SIZE="4G" \
            -e CPU_CORES="2" \
            dockurr/windows
          echo "Đang tải và khởi tạo Windows 10 ngầm..."

      - name: Cài đặt và cấu hình Nginx Reverse Proxy
        run: |
          sudo apt-get install nginx -y
          
          # Ghi đè cấu hình Nginx để điều hướng cổng 80 vào cổng 8006 của noVNC
          sudo tee /etc/nginx/sites-available/default << 'EOF'
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:8006;
                  proxy_http_version 1.1;
                  
                  # Cấu hình bắt buộc để chạy được WebSocket của noVNC
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "Upgrade";
                  
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF
          
          # Khởi động lại Nginx để áp dụng cấu hình mới
          sudo systemctl restart nginx
          echo "Nginx Reverse Proxy đã kích hoạt trên cổng 80."

      - name: Cài đặt Cloudflare Tunnel và xuất đường link noVNC
        run: |
          # Tải công cụ luân chuyển cổng của Cloudflare
          curl -L --output cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb
          
          # Chạy đường hầm hướng vào cổng 80 của Nginx và lưu log
          cloudflared tunnel --url http://127.0.0.1:80 --logfile cloudflare.log &
          sleep 10
          
          # Trích xuất đường link truy cập công khai duy nhất từ log
          echo "===================================================="
          echo "=== ĐƯỜNG LINK TRUY CẬP WINDOWS 10 CỦA BẠN (QUA NGINX) ==="
          grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' cloudflare.log | head -n 1
          echo "===================================================="

      - name: Duy trì máy ảo hoạt động (Tối đa 6 tiếng)
        run: |
          echo "Môi trường đang chạy ổn định..."
          sleep 19800
